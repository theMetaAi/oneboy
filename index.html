<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ONE BOY | 資料處理員 招募中</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --sky-blue: #1a7fd4;
    --electric-blue: #0ea5e9;
    --bright-green: #22c55e;
    --neon-green: #4ade80;
    --dark-navy: #0a1628;
    --mid-navy: #0f2040;
    --cloud-white: #e8f4fd;
    --text-white: #ffffff;
    --gold-accent: #fbbf24;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--dark-navy);
    color: var(--text-white);
    overflow-x: hidden;
    min-height: 100vh;
  }

  /* Sky gradient background */
  .page-bg {
    background: linear-gradient(180deg,
      #0a1628 0%,
      #0f2a50 20%,
      #1a4a7a 40%,
      #1e6aad 60%,
      #2585cc 80%,
      #1a7fd4 100%
    );
    position: relative;
  }

  /* Floating particles */
  .particles {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }
  .particle {
    position: absolute;
    width: 2px; height: 2px;
    background: var(--neon-green);
    border-radius: 50%;
    animation: float linear infinite;
    opacity: 0.6;
  }
  @keyframes float {
    0% { transform: translateY(100vh) translateX(0); opacity: 0; }
    10% { opacity: 0.6; }
    90% { opacity: 0.6; }
    100% { transform: translateY(-10vh) translateX(30px); opacity: 0; }
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 430px;
    margin: 0 auto;
    padding: 0 0 40px;
  }

  /* Header band */
  .header-band {
    background: linear-gradient(135deg, var(--dark-navy) 0%, var(--mid-navy) 100%);
    border-bottom: 2px solid var(--electric-blue);
    padding: 18px 20px 14px;
    text-align: center;
  }
  .brand-tag {
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--electric-blue);
    font-weight: 700;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .header-title {
    font-size: 26px;
    font-weight: 900;
    color: var(--text-white);
    line-height: 1.1;
  }
  .header-title span {
    color: var(--neon-green);
  }

  /* Hero section */
  .hero {
    padding: 30px 20px 20px;
    text-align: center;
    position: relative;
  }

  .hero-eyebrow {
    font-size: 13px;
    color: var(--electric-blue);
    letter-spacing: 2px;
    font-weight: 700;
    margin-bottom: 12px;
    text-transform: uppercase;
  }

  .hero-h1 {
    font-size: 32px;
    font-weight: 900;
    line-height: 1.25;
    margin-bottom: 6px;
    color: var(--text-white);
    text-shadow: 0 2px 20px rgba(0,100,200,0.5);
  }
  .hero-h1 .green {
    color: var(--neon-green);
    text-shadow: 0 0 20px rgba(74,222,128,0.6);
  }

  .hero-sub {
    display: inline-block;
    background: rgba(14, 165, 233, 0.2);
    border: 1.5px solid var(--electric-blue);
    border-radius: 30px;
    padding: 6px 20px;
    font-size: 15px;
    font-weight: 700;
    color: var(--text-white);
    margin: 14px 0 20px;
  }
  .hero-sub .bold-green {
    color: var(--neon-green);
    font-weight: 900;
  }

  /* CTA Button */
  .cta-btn {
    display: block;
    width: 100%;
    max-width: 340px;
    margin: 0 auto;
    background: linear-gradient(135deg, var(--bright-green) 0%, #16a34a 100%);
    color: #fff;
    font-size: 20px;
    font-weight: 900;
    text-decoration: none;
    border-radius: 50px;
    padding: 18px 24px;
    text-align: center;
    box-shadow: 0 4px 30px rgba(34,197,94,0.5), 0 0 0 4px rgba(34,197,94,0.15);
    letter-spacing: 1px;
    transition: transform 0.15s, box-shadow 0.15s;
    position: relative;
    overflow: hidden;
  }
  .cta-btn::before {
    content: '';
    position: absolute;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: linear-gradient(45deg, transparent 40%, rgba(255,255,255,0.15) 50%, transparent 60%);
    animation: shimmer 2.5s infinite;
  }
  @keyframes shimmer {
    0% { transform: translateX(-100%) rotate(45deg); }
    100% { transform: translateX(100%) rotate(45deg); }
  }
  .cta-btn:active { transform: scale(0.97); }
  .cta-arrow {
    font-size: 18px;
    margin-left: 8px;
  }

  /* Divider */
  .divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--electric-blue), transparent);
    margin: 28px 20px;
    opacity: 0.5;
  }

  /* Section: SOP */
  .section {
    padding: 0 20px;
    margin-bottom: 28px;
  }

  .section-label {
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--electric-blue);
    font-weight: 700;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .big-statement {
    font-size: 22px;
    font-weight: 900;
    line-height: 1.4;
    color: var(--text-white);
    margin-bottom: 6px;
  }
  .big-statement .green { color: var(--neon-green); }
  .big-statement .blue { color: var(--electric-blue); }

  /* Feature cards */
  .features {
    display: flex;
    flex-direction: column;
    gap: 12px;
    padding: 0 20px;
    margin-bottom: 28px;
  }
  .feature-card {
    background: linear-gradient(135deg, rgba(14,165,233,0.1) 0%, rgba(10,22,40,0.8) 100%);
    border: 1px solid rgba(14,165,233,0.3);
    border-left: 3px solid var(--neon-green);
    border-radius: 12px;
    padding: 16px 18px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    backdrop-filter: blur(4px);
  }
  .feature-icon {
    font-size: 22px;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .feature-text {
    font-size: 15px;
    font-weight: 700;
    line-height: 1.5;
    color: var(--text-white);
  }
  .feature-text .green { color: var(--neon-green); }

  /* Who is this for */
  .callout-box {
    margin: 0 20px 28px;
    background: linear-gradient(135deg, rgba(26,127,212,0.25) 0%, rgba(10,22,40,0.9) 100%);
    border: 1.5px solid var(--electric-blue);
    border-radius: 16px;
    padding: 22px 20px;
    text-align: center;
  }
  .callout-title {
    font-size: 13px;
    letter-spacing: 2px;
    color: var(--electric-blue);
    font-weight: 700;
    margin-bottom: 10px;
    text-transform: uppercase;
  }
  .callout-main {
    font-size: 28px;
    font-weight: 900;
    color: var(--text-white);
    line-height: 1.3;
  }
  .callout-main .green {
    color: var(--neon-green);
    text-shadow: 0 0 16px rgba(74,222,128,0.5);
  }
  .callout-exclaim {
    color: var(--gold-accent);
  }

  /* Ad image */
  .ad-image-wrap {
    padding: 0 20px;
    margin-bottom: 24px;
  }
  .ad-image-wrap img {
    width: 100%;
    border-radius: 16px;
    border: 2px solid rgba(14,165,233,0.4);
    box-shadow: 0 8px 40px rgba(0,0,0,0.5), 0 0 0 1px rgba(74,222,128,0.1);
    display: block;
  }

  /* Bottom CTA */
  .bottom-cta {
    padding: 0 20px;
  }
  .bottom-note {
    text-align: center;
    font-size: 12px;
    color: rgba(255,255,255,0.4);
    margin-top: 14px;
    letter-spacing: 1px;
  }

  /* Glow lines decoration */
  .glow-line {
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--neon-green), transparent);
    opacity: 0.4;
    margin: 0 20px 28px;
  }
</style>
</head>
